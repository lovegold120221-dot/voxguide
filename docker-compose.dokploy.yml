services:
  voxx-zero:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voxx-zero
    env_file:
      - .env
    environment:
      SANDBOX_PORT: "4300"
      WA_AUTH_ROOT: /data/baileys
      WA_LOG_LEVEL: silent
    ports:
      - "4300:4300"
    volumes:
      - baileys_auth:/data/baileys
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4300/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  baileys_auth:
