services:
  whatsapp-server:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    container_name: beatrice-server
    env_file:
      - .env.whatsapp
    environment:
      SANDBOX_PORT: "4300"
      WA_AUTH_ROOT: /data/baileys
      WA_LOG_LEVEL: ${WA_LOG_LEVEL:-silent}
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      HOME: /home/node
      OPENCODE_PATH: /home/node/.opencode/bin/opencode
      OPENCODE_MODEL: opencode/zenn-ai-large-free
      OPENCODE_FALLBACK_MODEL: opencode/deepseek-v4-flash-free
      OPENCODE_ZEN_FREE_MODELS: opencode/zenn-ai-large-free,opencode/deepseek-v4-flash-free,opencode/big-pickle,opencode/north-mini-code-free,opencode/mimo-v2.5-free,opencode/nemotron-3-ultra-free
      OPEN_TERMINAL_FALLBACK_MODEL: media-pipe/eburon-sandbox-worker:latest
      OPEN_TERMINAL_WORKDIR: /app
      BEATRICE_WORKSPACE_DIR: /data/beatrice-workspace
      BEATRICE_PUBLIC_URL: https://beatrice.eburon.ai
    network_mode: "host"
    volumes:
      - whatsapp_auth:/data/baileys
      - /root/.opencode:/home/node/.opencode:ro
      - beatrice_workspace:/data/beatrice-workspace
      - wa_media:/data/wa-media
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4300/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  whatsapp_auth:
  beatrice_workspace:
  wa_media:
